<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Python Script Call Graph - Interactive Visualization</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.8.5/d3.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            color: #e0e0e0;
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 1400px;
            margin: 0 auto;
        }
        
        header {
            text-align: center;
            margin-bottom: 30px;
            padding: 20px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 15px;
            backdrop-filter: blur(10px);
        }
        
        h1 {
            font-size: 2.5em;
            color: #00d4ff;
            margin-bottom: 10px;
            text-shadow: 0 0 20px rgba(0, 212, 255, 0.3);
        }
        
        .subtitle {
            color: #888;
            font-size: 1.1em;
        }
        
        #graph-container {
            background: rgba(255, 255, 255, 0.02);
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 30px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        .controls {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }
        
        .control-btn {
            padding: 12px 24px;
            font-size: 14px;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            background: linear-gradient(135deg, #00d4ff 0%, #0099cc 100%);
            color: white;
            font-weight: 600;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(0, 212, 255, 0.3);
        }
        
        .control-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(0, 212, 255, 0.4);
        }
        
        .control-btn:active {
            transform: translateY(0);
        }
        
        .legend {
            display: flex;
            justify-content: center;
            gap: 30px;
            margin-top: 20px;
            flex-wrap: wrap;
        }
        
        .legend-item {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .legend-color {
            width: 20px;
            height: 20px;
            border-radius: 50%;
        }
        
        .function-node {
            cursor: pointer;
        }
        
        .function-node rect {
            stroke-width: 2;
            transition: all 0.3s ease;
        }
        
        .function-node rect:hover {
            stroke-width: 4;
            filter: brightness(1.2);
        }
        
        .function-node-text {
            font-size: 12px;
            font-weight: 500;
            pointer-events: none;
        }
        
        .link {
            fill: none;
            stroke-opacity: 0.6;
            stroke-width: 2px;
            transition: all 0.3s ease;
        }
        
        .link.main-call {
            stroke: #00d4ff;
            stroke-dasharray: 5, 3;
        }
        
        .link.error-return {
            stroke: #ff6b6b;
            stroke-dasharray: 3, 3;
        }
        
        .link.success-return {
            stroke: #51cf66;
        }
        
        .tooltip {
            position: absolute;
            padding: 15px;
            background: rgba(26, 26, 46, 0.95);
            border: 1px solid rgba(0, 212, 255, 0.5);
            border-radius: 10px;
            pointer-events: none;
            backdrop-filter: blur(10px);
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
            max-width: 350px;
            z-index: 1000;
        }
        
        .tooltip h3 {
            color: #00d4ff;
            margin-bottom: 10px;
            font-size: 1.2em;
        }
        
        .tooltip p {
            color: #ccc;
            font-size: 0.9em;
            line-height: 1.4;
        }
        
        .tooltip .return-type {
            margin-top: 10px;
            padding-top: 10px;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            color: #51cf66;
            font-weight: bold;
        }
        
        .zoom-controls {
            position: absolute;
            top: 20px;
            right: 20px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        
        .zoom-btn {
            width: 40px;
            height: 40px;
            border: none;
            border-radius: 50%;
            background: rgba(0, 212, 255, 0.2);
            color: #00d4ff;
            font-size: 18px;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        
        .zoom-btn:hover {
            background: rgba(0, 212, 255, 0.4);
            transform: scale(1.1);
        }
        
        @media (max-width: 768px) {
            h1 {
                font-size: 1.8em;
            }
            
            .legend {
                flex-direction: column;
                gap: 10px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🐍 Python Script Call Graph</h1>
            <p class="subtitle">Interactive visualization of <code>03_delay_get_option_twenteen_three.py</code></p>
        </header>
        
        <div class="controls">
            <button class="control-btn" onclick="resetZoom()">Reset View</button>
            <button class="control-btn" onclick="toggleLinks()">Toggle Connections</button>
            <button class="control-btn" onclick="centerGraph()">Center Graph</button>
        </div>
        
        <div id="graph-container">
            <div class="zoom-controls">
                <button class="zoom-btn" onclick="zoomIn()">+</button>
                <button class="zoom-btn" onclick="zoomOut()">−</button>
            </div>
            <svg id="graph" width="100%" height="600px"></svg>
        </div>
        
        <div class="legend">
            <div class="legend-item">
                <div class="legend-color" style="background: #00d4ff; border-radius: 50%; width: 20px; height: 20px;"></div>
                <span>Main Function Call</span>
            </div>
            <div class="legend-item">
                <div class="legend-color" style="background: #51cf66; width: 20px; height: 20px;"></div>
                <span>Success Return</span>
            </div>
            <div class="legend-item">
                <div class="legend-color" style="background: #ff6b6b; width: 20px; height: 20px;"></div>
                <span>Error Return</span>
            </div>
        </div>
    </div>

    <script>
        // Graph data representing the call structure
        const graphData = {
            nodes: [
                { id: "main", name: "__main__", type: "main", description: "Script entry point" },
                { id: "authenticate_market_data", name: "authenticate_market_data()", type: "function", description: "Authenticates to IBKR market-data service. Returns (success, error)" },
                { id: "get_stock_price", name: "get_stock_price()", type: "function", description: "Fetches current stock price. Returns (data, error)" },
                { id: "secdefSearch", name: "secdefSearch()", type: "function", description: "Searches option contract metadata. Returns (result, error)" },
                { id: "secdefStrikes", name: "secdefStrikes()", type: "function", description: "Retrieves put strikes for a month. Returns (strikes, error)" },
                { id: "secdefInfo", name: "secdefInfo()", type: "function", description: "Fetches option contracts for strike/month. Returns (contracts, error)" },
                { id: "get_option_snapshot_bulk", name: "get_option_snapshot_bulk()", type: "function", description: "Retrieves market data with retry logic. Returns (data, error)" },
                { id: "write_debug_log", name: "write_debug_log()", type: "function", description: "Writes contracts to debug log. Returns (success, error)" },
                { id: "writeResult", name: "writeResult()", type: "function", description: "Writes filtered contracts to CSV. Returns (success, error)" },
                { id: "save_stock_price_to_csv", name: "save_stock_price_to_csv()", type: "function", description: "Appends stock price to CSV. Returns (success, error)" },
                { id: "get_session", name: "get_session()", type: "helper", description: "Returns singleton requests.Session for connection pooling" },
                { id: "_data_is_complete", name: "_data_is_complete()", type: "helper", description: "Validates contract has all required fields" }
            ],
            links: [
                // Main flow
                { source: "main", target: "secdefSearch", type: "call" },
                { source: "main", target: "get_stock_price", type: "call" },
                { source: "main", target: "writeResult", type: "call" },
                
                // Stock price flow
                { source: "get_stock_price", target: "authenticate_market_data", type: "call" },
                { source: "get_stock_price", target: "get_session", type: "util" },
                
                // Search flow
                { source: "secdefSearch", target: "get_session", type: "util" },
                
                // Strikes flow
                { source: "main", target: "secdefStrikes", type: "call" },
                { source: "secdefStrikes", target: "get_session", type: "util" },
                
                // Option info flow
                { source: "main", target: "secdefInfo", type: "call" },
                { source: "secdefInfo", target: "get_session", type: "util" },
                
                // Snapshot bulk flow
                { source: "writeResult", target: "get_option_snapshot_bulk", type: "call" },
                { source: "get_option_snapshot_bulk", target: "authenticate_market_data", type: "call" },
                { source: "get_option_snapshot_bulk", target: "get_session", type: "util" },
                { source: "get_option_snapshot_bulk", target: "_data_is_complete", type: "util" },
                
                // Write operations
                { source: "writeResult", target: "write_debug_log", type: "call" },
                
                // Returns (success/error paths)
                { source: "authenticate_market_data", target: "main", type: "return", returnType: "success" },
                { source: "get_stock_price", target: "main", type: "return", returnType: "success" },
                { source: "secdefSearch", target: "main", type: "return", returnType: "success" },
                { source: "writeResult", target: "main", type: "return", returnType: "success" }
            ]
        };

        // Initialize the graph
        const width = document.getElementById('graph').clientWidth;
        const height = document.getElementById('graph').clientHeight;
        
        const svg = d3.select("#graph")
            .append("g")
            .attr("transform", `translate(${width / 2}, ${height / 2})`);
        
        const Tooltip = d3.select("body").append("div")
            .attr("class", "tooltip")
            .style("opacity", 0);

        // Create force simulation
        const simulation = d3.forceSimulation(graphData.nodes)
            .force("link", d3.forceLink(graphData.links).id(d => d.id).distance(150).strength(1))
            .force("charge", d3.forceManyBody().strength(-400))
            .force("center", d3.forceCenter(0, 0))
            .force("collision", d3.forceCollide().radius(100));

        // Create links
        const link = svg.append("g")
            .selectAll("line")
            .data(graphData.links.filter(d => d.type === "call" || d.type === "return"))
            .enter()
            .append("line")
            .attr("class", d => `link ${d.returnType || ''}`)
            .attr("stroke", d => {
                if (d.type === "return") {
                    return d.returnType === "success" ? "#51cf66" : "#ff6b6b";
                }
                return d.type === "call" ? "#00d4ff" : "#888";
            });

        // Create nodes
        const node = svg.append("g")
            .selectAll("g")
            .data(graphData.nodes)
            .enter()
            .append("g")
            .attr("class", "function-node")
            .call(d3.drag()
                .on("start", dragstarted)
                .on("drag", dragged)
                .on("end", dragended));

        // Add rectangles for nodes
        node.append("rect")
            .attr("width", d => d.name.length * 10 + 40)
            .attr("height", 50)
            .attr("x", d => -(d.name.length * 10 + 40) / 2)
            .attr("y", -25)
            .attr("rx", 10)
            .attr("fill", d => {
                if (d.type === "main") return "#6a0572";
                if (d.type === "function") return "#1a1a2e";
                return "#0f3460";
            })
            .attr("stroke", d => {
                if (d.type === "main") return "#00d4ff";
                if (d.type === "function") return "#0099cc";
                return "#555";
            })
            .attr("stroke-width", 2);

        // Add text labels
        node.append("text")
            .attr("class", "function-node-text")
            .attr("dy", "0.35em")
            .attr("text-anchor", "middle")
            .attr("fill", "#fff")
            .text(d => d.name.length > 20 ? d.name.substring(0, 20) + "..." : d.name);

        // Add tooltips
        node.on("mouseover", function(event, d) {
            Tooltip.transition()
                .duration(200)
                .style("opacity", .9);
            Tooltip.html(`
                <h3>${d.name}</h3>
                <p>${d.description}</p>
                ${d.type === "function" ? '<div class="return-type">Returns: (result, error) tuple</div>' : ''}
            `)
                .style("left", (event.pageX + 10) + "px")
                .style("top", (event.pageY - 28) + "px");
        })
        .on("mouseout", function() {
            Tooltip.transition()
                .duration(500)
                .style("opacity", 0);
        });

        // Update positions on tick
        simulation.on("tick", () => {
            link.attr("x1", d => d.source.x)
                .attr("y1", d => d.source.y)
                .attr("x2", d => d.target.x)
                .attr("y2", d => d.target.y);
            
            node.attr("transform", d => `translate(${d.x}, ${d.y})`);
        });

        // Drag functions
        function dragstarted(event) {
            if (!event.active) simulation.alphaTarget(0.3).restart();
            event.subject.fx = event.subject.x;
            event.subject.fy = event.subject.y;
        }

        function dragged(event) {
            event.subject.fx = event.x;
            event.subject.fy = event.y;
        }

        function dragended(event) {
            if (!event.active) simulation.alphaTarget(0);
            event.subject.fx = null;
            event.subject.fy = null;
        }

        // Zoom functions
        let currentScale = 1;
        
        function zoomIn() {
            currentScale += 0.2;
            svg.transition().duration(300).attr("transform", `translate(${width/2}, ${height/2}) scale(${currentScale})`);
        }
        
        function zoomOut() {
            currentScale = Math.max(0.1, currentScale - 0.2);
            svg.transition().duration(300).attr("transform", `translate(${width/2}, ${height/2}) scale(${currentScale})`);
        }
        
        function resetZoom() {
            currentScale = 1;
            svg.transition().duration(500).attr("transform", "translate(0, 0) scale(1)");
        }
        
        function centerGraph() {
            svg.transition().duration(1000).attr("transform", "translate(0, 0) scale(1)");
            simulation.alpha(1).restart();
        }
        
        function toggleLinks() {
            const links = d3.selectAll(".link");
            const isVisible = links.style("opacity") !== "0";
            links.transition().duration(300).style("opacity", isVisible ? 0 : 1);
        }
    </script>
</body>
</html>
